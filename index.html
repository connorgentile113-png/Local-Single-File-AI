<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI - Fast Mode</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --accent: #38bdf8; --user-msg: #0369a1; --ai-msg: #334155; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
        header { padding: 1rem; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .status-tag { font-size: 0.75rem; padding: 4px 8px; border-radius: 12px; background: #475569; }
        .status-online { background: #16a34a; }
        .status-loading { background: #ca8a04; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; word-wrap: break-word; }
        .user-message { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background: var(--ai-msg); border-bottom-left-radius: 2px; }
        footer { padding: 20px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }
        #overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div><strong>LocalLLM</strong> <small>(SmolLM 135M)</small></div>
    <div id="status" class="status-tag">Initializing...</div>
</header>

<div id="chat-container">
    <div class="message ai-message"><strong>Instructions:</strong> To run this, do NOT double-click the file. You MUST run it via a Local Server (see instructions below).</div>
</div>

<div id="overlay">
    <div class="spinner"></div>
    <div id="overlay-text">Downloading Model...</div>
</div>

<footer>
    <input type="text" id="user-input" placeholder="Type something..." autocomplete="off">
    <button id="send-btn">Send</button>
</footer>

<script id="worker-script" type="text/plain">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // Important: No proxy here. We rely on the Local Server to allow the connection.
    env.allowLocalModels = false;

    let generator = null;

    self.onmessage = async (e) => {
        const { type, text } = e.data;
        if (type === 'load') {
            try {
                self.postMessage({ type: 'status', text: 'Loading model into WebGPU...' });
                generator = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', { device: 'webgpu' });
                self.postMessage({ type: 'ready' });
            } catch (err) {
                self.postMessage({ type: 'error', text: err.message });
            }
        }
        if (type === 'generate') {
            if (!generator) return;
            try {
                const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
                const output = await generator(prompt, { max_new_tokens: 150, temperature: 0.7, do_sample: true, repetition_penalty: 1.2 });
                let res = output[0].generated_text.split('<|im_start|>assistant\n')[1] || output[0].generated_text;
                res = res.split('<|im_end|>')[0].trim();
                self.postMessage({ type: 'result', text: res });
            } catch (err) {
                self.postMessage({ type: 'error', text: err.message });
            }
        }
    };
</script>

<script type="module">
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusTag = document.getElementById('status');
    const overlay = document.getElementById('overlay');
    const overlayText = document.getElementById('overlay-text');

    const workerBlob = new Blob([document.getElementById('worker-script').textContent], { type: 'text/javascript' });
    const worker = new Worker(URL.createObjectURL(workerBlob), { type: 'module' });

    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}-message`;
        msgDiv.textContent = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    worker.onmessage = (e) => {
        const { type, text } = e.data;
        if (type === 'status') {
            statusTag.textContent = 'Loading';
            statusTag.className = 'status-tag status-loading';
            overlay.style.display = 'flex';
            overlayText.textContent = text;
        } else if (type === 'ready') {
            statusTag.textContent = 'Ready (WebGPU)';
            statusTag.className = 'status-tag status-online';
            overlay.style.display = 'none';
            sendBtn.disabled = false;
        } else if (type === 'result') {
            appendMessage('ai', text);
            sendBtn.disabled = false;
            userInput.disabled = false;
        } else if (type === 'error') {
            appendMessage('ai', "ERROR: " + text + "\n\nFIX: Run this via a Local Server (Python or VS Code Live Server) instead of double-clicking or using an online viewer.");
            overlay.style.display = 'none';
        }
    };

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;
        appendMessage('user', text);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        worker.postMessage({ type: 'generate', text });
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

    window.addEventListener('load', () => {
        if (!navigator.gpu) {
            statusTag.textContent = 'WebGPU Unsupported';
            alert("WebGPU not detected. Please use Chrome or Edge.");
            return;
        }
        worker.postMessage({ type: 'load' });
    });
</script>
</body>
</html>
